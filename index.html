  }

  const vc = document.createElement("div");
  vc.className = `verdict-card verdict-card--${oc}`;
  vc.style.cssText = "margin-bottom:12px;padding:14px 16px;flex-shrink:0;";
  if (oc === "decline") {
    vc.innerHTML = `<div class="verdict-card__indicator" style="margin-bottom:8px;"><div class="verdict-card__dot verdict-card__dot--${oc}"></div></div><div class="t-caps" style="font-size:12px;color:#000000;font-weight:600;letter-spacing:0.14em;opacity:0.7;margin-bottom:8px;">${v.verdict}</div><div style="font-family:'Outfit','DM Sans',sans-serif;font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.2;color:#000000;">Please put it to the soil bin.</div>`;
  } else {
    vc.innerHTML = `<div class="verdict-card__indicator" style="margin-bottom:8px;"><div class="verdict-card__dot verdict-card__dot--${oc}"></div></div><div style="font-family:'Outfit','DM Sans',sans-serif;font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.05;color:#000000;">${v.verdict}</div><div style="font-family:'Outfit','DM Sans',sans-serif;font-size:14px;font-weight:500;color:#000000;opacity:0.7;margin-top:6px;">${v.shelfLabel}</div>`;
  }
  left.appendChild(vc);

  if (oc === "decline") {
    const mw = document.createElement("div");
    mw.style.cssText = "flex-shrink:0;margin-bottom:12px;";
    mw.innerHTML = `<div style="font-size:15px;color:#000000;opacity:0.7;line-height:1.5;">Thank you for bringing this in.</div>`;
    left.appendChild(mw);
  }

  // Freshness checks: only show for accept/review (positive flow needs the detail).
  // For decline, hide the list entirely — the verdict + action is enough.
  if (oc !== "decline") {
    const checksWrap = document.createElement("div");
    checksWrap.style.cssText = "flex-shrink:0;display:flex;flex-direction:column;margin-top:6px;";
    const checksLabel = document.createElement("div");
    checksLabel.className = "t-caps";
    checksLabel.style.cssText = "margin-bottom:8px;font-size:12px;color:#000000;font-weight:600;letter-spacing:0.14em;flex-shrink:0;";
    checksLabel.textContent = "Freshness checks";
    checksWrap.appendChild(checksLabel);
    v.checks.forEach((ch, i) => {
      const row = document.createElement("div");
      row.style.cssText = `display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #000000;opacity:0;animation:fade-up 0.4s var(--ease-out-expo) ${0.3 + i * 0.15}s forwards;flex-shrink:0;`;
      row.innerHTML = `<div style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#FFFFFF;border:2px solid ${ch.ok ? "#34C759" : "#FF3B30"};flex-shrink:0;"><span style="font-size:11px;font-weight:700;color:${ch.ok ? "#34C759" : "#FF3B30"};">${ch.ok ? "✓" : "✗"}</span></div><div style="font-family:'Outfit','DM Sans',sans-serif;font-size:14px;letter-spacing:0.01em;color:#000000;line-height:1.3;">${ch.label}</div>`;

    left.appendChild(checksWrap);

  if (oc === "decline") {
    const anotherBtn = document.createElement("button");
    anotherBtn.className = "btn btn--cta";
    anotherBtn.style.cssText = "margin-top:14px;flex-shrink:0;align-self:stretch;min-width:0;";
    anotherBtn.textContent = "Done";

      setStage(STAGES.THANKS);
      activateStage("thanks");

            <div class="cabinet-frame cabinet-frame--right"></div>

            <div class="drawer-side drawer-side--left"></div>

              <div class="drawer-slot"></div>
              <div class="drawer-slot"></div>

        receiptHTML += `<div class="tag-line" style="animation:tag-line-reveal 5s ease ${0.3 + i * 0.12}s infinite;text-align:left;text-transform:none;letter-spacing:0.02em;font-size:14px;border-bottom:1px dashed #000000;padding:8px 0;margin-bottom:14px;font-weight:500;">${it.type.label}</div>`;

    "position:absolute;inset:30px;z-index:3;pointer-events:none;";
  center.appendChild(fr);

  s.appendChild(left);
  s.appendChild(center);

  if (meshRenderer) {
    meshRenderer.stop();
    meshRenderer = null;
  }
  activateStage("result");
}

// Move to the next item in the batch and re-enter the result stage with that item's verdict.
function advanceToNextBatchItem() {
  const nextIdx = getCurrentBatchIndex() + 1;
  setCurrentBatchIndex(nextIdx);
  const v = getVerdictForBatchItem(nextIdx);
  const newDid = generateDonationId();
  setState({ donationId: newDid, verdict: v });
  if ($did()) $did().textContent = `ID: ${newDid}`;
  setStage(STAGES.RESULT);
  buildResult(v, newDid);
  activateStage("result");
}
